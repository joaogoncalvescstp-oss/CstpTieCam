<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PLSS One Shot</title>
<style>
:root {
    --big-rivers-blue:    #071D49;
    --sky-blue-web:       #2367D3;
    --gold:               #F1B434;
    --red:                #ff3b30;
    --green:              #34c759;
    --glass:              rgba(255,255,255,0.18);
    --glass-border:       rgba(255,255,255,0.50);
    --glass-shadow:       0 4px 30px rgba(0,0,0,0.12);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    margin: 0;
    font-family: -apple-system, "SF Pro Text", sans-serif;
    color: white;
    min-height: 100vh;
    background:
        radial-gradient(ellipse at 20% 15%, rgba(35,103,211,0.60) 0%, transparent 50%),
        radial-gradient(ellipse at 82% 80%, rgba(29,87,165,0.45) 0%, transparent 50%),
        #071D49;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ═══════════════════════════════
   HEADER — logo top-left
═══════════════════════════════ */
.header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--glass);
    backdrop-filter: blur(5.8px);
    -webkit-backdrop-filter: blur(5.8px);
    border-bottom: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    z-index: 10;
}

.header-logo {
    width: 60px;
    height: 60px;
    object-fit: contain;
    flex-shrink: 0;
    
}

.header-title {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.4px;
    flex: 1;
}

.header-progress {
    font-size: 13px;
    opacity: 0.65;
    font-variant-numeric: tabular-nums;
    font-weight: 500;
}

/* ═══════════════════════════════
   MAIN CONTENT AREA
═══════════════════════════════ */
.main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 24px 120px;
    text-align: center;
    position: relative;
    z-index: 1;
}

.shot-label {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
    text-shadow: 0 2px 16px rgba(0,0,0,0.4);
    transition: opacity 0.2s ease;
}

.filename {
    font-size: 12px;
    color: rgba(255,255,255,0.50);
    font-family: "SF Mono", "Menlo", monospace;
    letter-spacing: 0.1px;
    margin-bottom: 18px;
    transition: opacity 0.2s ease;
}

.compass {
    font-size: 17px;
    font-weight: 600;
    min-height: 26px;
    transition: opacity 0.2s ease;
}

.good { color: #34c759; }
.warn { color: #ff453a; }

/* ═══════════════════════════════
   BOTTOM NAV BAR
═══════════════════════════════ */
.bottom-bar {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    z-index: 20;
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    background: rgba(7,29,73,0.55);
    backdrop-filter: blur(20px) saturate(1.8);
    -webkit-backdrop-filter: blur(20px) saturate(1.8);
    border-top: 1px solid rgba(255,255,255,0.18);
    display: flex;
    align-items: flex-end;
    justify-content: space-around;
    gap: 8px;
}

/* ── Small side buttons ── */
.nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    background: var(--glass);
    backdrop-filter: blur(5.8px);
    -webkit-backdrop-filter: blur(5.8px);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    border-radius: 16px;
    width: 72px;
    height: 62px;
    color: white;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2px;
    cursor: pointer;
    border: none;
    outline: none;

    /* Spring inflate animation */
    transform: scale(1);
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    will-change: transform;
}

.nav-btn .nav-icon { font-size: 22px; line-height: 1; }

/* Inflate on press */
.nav-btn:active {
    transform: scale(1.18) !important;
    transition: transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
}

/* ── Large center camera FAB ── */
.cam-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    background: white;
    border: none;
    border-radius: 50%;
    width: 80px;
    height: 80px;
    cursor: pointer;
    box-shadow: 0 6px 28px rgba(35,103,211,0.55), 0 2px 8px rgba(0,0,0,0.3);
    transform: scale(1) translateY(-16px);
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    will-change: transform;
    flex-shrink: 0;
    outline: none;
    position: relative;
    overflow: hidden;
}

.cam-btn img {
    width: 62px;
    height: 62px;
    object-fit: contain;
    pointer-events: none;
    display: block;
}

/* Pulse ring on camera btn */
.cam-btn::before {
    content: "";
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid rgba(35,103,211,0.45);
    animation: pulse-ring 2.4s ease-out infinite;
}

@keyframes pulse-ring {
    0%   { transform: scale(0.92); opacity: 0.8; }
    60%  { transform: scale(1.18); opacity: 0; }
    100% { transform: scale(1.18); opacity: 0; }
}

/* Camera inflate on press */
.cam-btn:active {
    transform: scale(1.22) translateY(-16px) !important;
    transition: transform 0.1s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
}

/* Shot-captured bounce keyframe */
@keyframes shot-bounce {
    0%   { transform: scale(1)    translateY(-16px); }
    30%  { transform: scale(1.28) translateY(-22px); }
    60%  { transform: scale(0.94) translateY(-14px); }
    80%  { transform: scale(1.06) translateY(-17px); }
    100% { transform: scale(1)    translateY(-16px); }
}

.cam-btn.bounce {
    animation: shot-bounce 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

/* Slide-up entry animation for bar items */
@keyframes slide-up {
    from { opacity: 0; transform: scale(0.7) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes slide-up-cam {
    from { opacity: 0; transform: scale(0.7) translateY(30px); }
    to   { opacity: 1; transform: scale(1) translateY(-16px); }
}

.nav-btn { animation: slide-up 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
.nav-btn:nth-child(1) { animation-delay: 0.05s; }
.nav-btn:nth-child(2) { animation-delay: 0.12s; }
.cam-btn              { animation: slide-up-cam 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.08s both; }
.nav-btn:nth-child(4) { animation-delay: 0.12s; }
.nav-btn:nth-child(5) { animation-delay: 0.05s; }

/* label transition on new shot */
@keyframes label-pop {
    0%   { opacity: 0; transform: translateY(10px) scale(0.95); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
}
.label-anim {
    animation: label-pop 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
}

input { display: none; }

/* ═══════════════════════════════
   GALLERY CAROUSEL MODAL
═══════════════════════════════ */
.gallery-overlay {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 100;
    background: rgba(0,0,0,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
.gallery-overlay.open { display: flex; }

/* Photo stage */
.gallery-stage {
    position: relative;
    width: 100%;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
}

.gallery-img {
    max-width: 92vw;
    max-height: 70vh;
    object-fit: contain;
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    transition: opacity 0.25s ease, transform 0.25s ease;
    user-select: none;
    -webkit-user-drag: none;
}
.gallery-img.fade-out { opacity: 0; transform: scale(0.96); }

/* Caption bar */
.gallery-caption {
    padding: 12px 20px 4px;
    text-align: center;
}
.gallery-caption .cap-label {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.2px;
}
.gallery-caption .cap-file {
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    font-family: "SF Mono", "Menlo", monospace;
    margin-top: 3px;
}

/* Dot strip */
.gallery-dots {
    display: flex;
    gap: 6px;
    padding: 10px 0 6px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 80vw;
}
.gallery-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    transition: background 0.25s, transform 0.25s;
    cursor: pointer;
    border: none;
    padding: 0;
    flex-shrink: 0;
}
.gallery-dot.active {
    background: var(--gold);
    transform: scale(1.55);
}

/* Prev / Next arrows */
.gallery-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.25);
    background: rgba(255,255,255,0.08);
    color: white;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 2;
    transition: background 0.2s, transform 0.2s;
}
.gallery-arrow:active { background: var(--gold); color: var(--big-rivers-blue); transform: translateY(-50%) scale(1.12); }
.gallery-arrow.prev { left: 10px; }
.gallery-arrow.next { right: 10px; }

/* Top bar: counter + close + share */
.gallery-topbar {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px calc(8px + env(safe-area-inset-top));
}
.gallery-counter {
    font-size: 13px;
    font-weight: 600;
    color: rgba(255,255,255,0.55);
    font-variant-numeric: tabular-nums;
}
.gallery-topbar-btn {
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    color: white;
    font-size: 13px;
    font-weight: 600;
    padding: 7px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: background 0.2s;
}
.gallery-topbar-btn.close-btn { padding: 7px 13px; font-size: 16px; }
.gallery-topbar-btn:active { background: rgba(255,255,255,0.3); }

/* Bottom share bar */
.gallery-bottombar {
    width: 100%;
    display: flex;
    gap: 10px;
    justify-content: center;
    padding: 10px 16px calc(18px + env(safe-area-inset-bottom));
}
.gallery-action-btn {
    flex: 1;
    max-width: 180px;
    padding: 14px 0;
    border-radius: 14px;
    border: none;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.2px;
    transition: opacity 0.2s;
}
.gallery-action-btn:active { opacity: 0.75; }
.btn-share { background: var(--sky-blue-web); color: white; }
.btn-zip   { background: var(--gold);         color: var(--big-rivers-blue); }

/* Empty state */
.gallery-empty {
    font-size: 15px;
    color: rgba(255,255,255,0.45);
    text-align: center;
    padding: 40px 20px;
}
/* ═══════════════════════════════
   LIVE COMPASS RULER
═══════════════════════════════ */
.compass-widget {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    margin-bottom: 18px;
    width: 100%;
}

/* Big degree number */
.compass-readout {
    font-size: 42px;
    font-weight: 800;
    letter-spacing: -1px;
    font-variant-numeric: tabular-nums;
    color: white;
    text-shadow: 0 2px 16px rgba(0,0,0,0.4);
    line-height: 1;
}
.compass-readout .deg-cardinal {
    font-size: 16px;
    font-weight: 500;
    color: rgba(255,255,255,0.5);
    margin-left: 6px;
    letter-spacing: 2px;
}

/* Center marker triangle */
.ruler-wrapper {
    position: relative;
    width: 100%;
    height: 44px;
    overflow: hidden;
}
.ruler-wrapper::before,
.ruler-wrapper::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 60px;
    z-index: 2;
    pointer-events: none;
}
.ruler-wrapper::before {
    left: 0;
    background: linear-gradient(to right, rgba(7,29,73,1), transparent);
}
.ruler-wrapper::after {
    right: 0;
    background: linear-gradient(to left, rgba(7,29,73,1), transparent);
}

/* Center indicator — triangle on top pointing DOWN to the scale */
.ruler-center-mark {
    position: absolute;
    left: 50%;
    top: 0;
    transform: translateX(-50%);
    width: 2px;
    height: 100%;
    z-index: 3;
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
}
/* Downward triangle at the very top */
.ruler-center-mark::before {
    content: '';
    display: block;
    width: 0;
    height: 0;
    border-left:  6px solid transparent;
    border-right: 6px solid transparent;
    border-top:   9px solid white;
    filter: drop-shadow(0 0 5px rgba(255,255,255,0.9));
    flex-shrink: 0;
}
/* Thin line from triangle down through the ticks */
.ruler-center-mark::after {
    content: '';
    display: block;
    width: 2px;
    flex: 1;
    background: white;
    box-shadow: 0 0 6px rgba(255,255,255,0.6);
}

/* Canvas ruler strip */
#rulerCanvas {
    display: block;
    width: 100%;
    height: 44px;
    image-rendering: pixelated;
}
.thumb-strip {
    flex-shrink: 0;
    width: 100%;
    height: 120px;
    display: flex;
    align-items: center;
    overflow-x: auto;
    overflow-y: visible;
    padding: 8px 20px 10px;
    gap: 10px;
    scrollbar-width: none;
    -ms-overflow-style: none;
    z-index: 3;
    margin-top: 30px;
}
.thumb-strip::-webkit-scrollbar { display: none; }

/* left-edge fade */
.thumb-strip::before {
    content: '';
    position: sticky;
    left: 0;
    min-width: 32px;
    height: 100%;
    background: linear-gradient(to right, rgba(7,29,73,0.85), transparent);
    z-index: 1;
    pointer-events: none;
    flex-shrink: 0;
    margin-right: -32px;
}

/* Polaroid card */
.thumb-card {
    flex-shrink: 0;
    background: white;
    padding: 5px 5px 24px;
    border-radius: 3px;
    box-shadow:
        0 2px 6px rgba(0,0,0,0.35),
        0 8px 24px rgba(0,0,0,0.45);
    transform: rotate(var(--rot, 0deg));
    transform-origin: center bottom;
    cursor: pointer;
    position: relative;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1),
                box-shadow 0.25s ease;
    animation: polaroid-in 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}
.thumb-card:hover,
.thumb-card:active {
    transform: rotate(0deg) scale(1.1) translateY(-6px);
    box-shadow: 0 12px 36px rgba(0,0,0,0.6), 0 0 0 2px var(--gold);
    z-index: 10;
}
.thumb-card img {
    width: 74px;
    height: 74px;
    object-fit: cover;
    display: block;
    border-radius: 1px;
}
.thumb-card .tcap {
    position: absolute;
    bottom: 4px;
    left: 0; right: 0;
    text-align: center;
    font-size: 7.5px;
    color: #444;
    font-family: "SF Mono", "Menlo", monospace;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    padding: 0 5px;
    letter-spacing: 0.3px;
}
/* newest card gold shimmer ring */
.thumb-card.newest::after {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 3px;
    border: 2px solid var(--gold);
    animation: shimmer-ring 1.2s ease-out forwards;
}
@keyframes shimmer-ring {
    0%   { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.12); }
}

/* entrance */
@keyframes polaroid-in {
    0%   { opacity: 0; transform: scale(0.25) rotate(calc(var(--rot) - 25deg)) translateY(50px); }
    65%  { opacity: 1; transform: scale(1.1)  rotate(calc(var(--rot) + 4deg))  translateY(-10px); }
    100% { opacity: 1; transform: scale(1)    rotate(var(--rot))               translateY(0); }
}

/* empty hint */
.thumb-hint {
    flex-shrink: 0;
    font-size: 11px;
    color: rgba(255,255,255,0.22);
    letter-spacing: 0.5px;
    white-space: nowrap;
    padding-left: 8px;
    pointer-events: none;
}
</style>
</head>

// ── EXIF INJECTION — self-contained, no CDN needed ───
// Builds a minimal EXIF APP1 segment and splices it into the JPEG.

function writeUint16BE(val) {
    return [val >> 8 & 0xff, val & 0xff];
}
function writeUint32BE(val) {
    return [(val >> 24) & 0xff, (val >> 16) & 0xff, (val >> 8) & 0xff, val & 0xff];
}

// TIFF rational: numerator / 1
function rational(num) {
    const n = Math.round(Math.abs(num) * 1000000);
    return writeUint32BE(n).concat(writeUint32BE(1000000));
}

// DMS rational arrays for GPS
function decToDMSRational(decimal) {
    const abs = Math.abs(decimal);
    const d   = Math.floor(abs);
    const mf  = (abs - d) * 60;
    const m   = Math.floor(mf);
    const sf  = (mf - m) * 60;
    const s   = Math.round(sf * 100);
    // 3 rationals: deg, min, sec (as n/100)
    return writeUint32BE(d).concat(writeUint32BE(1),
           writeUint32BE(m).concat(writeUint32BE(1)),
           writeUint32BE(s).concat(writeUint32BE(100)));
}

// ASCII IFD entry value (padded to multiple of 2, null terminated)
function asciiBytes(str) {
    const bytes = [];
    for (let i = 0; i < str.length; i++) bytes.push(str.charCodeAt(i) & 0xff);
    bytes.push(0);
    if (bytes.length % 2 !== 0) bytes.push(0);
    return bytes;
}

// Build one IFD entry (12 bytes) + any overflow value bytes
// tag: uint16, type: uint16, count: uint32, value fits in 4 bytes or is offset
function ifdEntry(tag, type, count, valueBytes) {
    // type 2=ASCII, 5=RATIONAL, 7=UNDEFINED, 1=BYTE
    const entry = writeUint16BE(tag).concat(writeUint16BE(type), writeUint32BE(count));
    if (valueBytes.length <= 4) {
        const padded = valueBytes.slice();
        while (padded.length < 4) padded.push(0);
        return { entry: entry.concat(padded), overflow: [] };
    }
    // Offset filled in later
    return { entry: entry.concat([0,0,0,0]), overflow: valueBytes };
}

async function injectExif(file, shotIndex) {
    try {
        // Read JPEG bytes
        const arrayBuffer = await file.arrayBuffer();
        const jpegBytes   = new Uint8Array(arrayBuffer);

        // Verify JPEG SOI marker
        if (jpegBytes[0] !== 0xFF || jpegBytes[1] !== 0xD8) return file;

        const now      = new Date();
        const shotLabel = sequence[shotIndex] ? sequence[shotIndex][0] : "";
        const dtStr    = `${now.getFullYear()}:${String(now.getMonth()+1).padStart(2,'0')}:${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

        // ── Build IFD0 (Image) entries ────────────────────
        const makeStr  = asciiBytes("City of Saint Paul");
        const modelStr = asciiBytes("PLSS Capture");
        const swStr    = asciiBytes(`PLSS Capture v1 CityID:${cityId}`);
        const artStr   = asciiBytes(crewLeader || "Unknown");
        const cpyStr   = asciiBytes(`City of Saint Paul Public Works ${now.getFullYear()}`);
        const descStr  = asciiBytes(`${shotLabel} | CityID:${cityId} | Crew:${crewLeader}`);
        const dtStrB   = asciiBytes(dtStr);

        // TIFF header: little-endian, magic 42, IFD0 offset = 8
        // We'll build in LITTLE-ENDIAN (most common for EXIF)
        function le16(v) { return [v & 0xff, (v >> 8) & 0xff]; }
        function le32(v) { return [v & 0xff, (v>>8)&0xff, (v>>16)&0xff, (v>>24)&0xff]; }
        function leRat(num, den) { return le32(num).concat(le32(den)); }

        function dmsLE(decimal) {
            const abs = Math.abs(decimal);
            const d   = Math.floor(abs);
            const mf  = (abs - d) * 60;
            const m   = Math.floor(mf);
            const s   = Math.round((mf - m) * 60 * 10000);
            return leRat(d,1).concat(leRat(m,1)).concat(leRat(s,10000));
        }

        // IFD entry: 12 bytes LE
        // Returns {hdr:[12 bytes], data:[extra bytes]}
        function entry(tag, type, count, valOrData) {
            const h = le16(tag).concat(le16(type), le32(count));
            if (valOrData.length <= 4) {
                const v = valOrData.slice();
                while (v.length < 4) v.push(0);
                return { hdr: h.concat(v), data: [] };
            }
            return { hdr: h.concat([0,0,0,0]), data: valOrData };
        }

        function strEntry(tag, str) {
            const b = [];
            for (let i = 0; i < str.length; i++) b.push(str.charCodeAt(i));
            b.push(0);
            return entry(tag, 2, b.length, b);
        }

        // ── IFD0 tags ─────────────────────────────────────
        const ifd0Entries = [
            strEntry(0x010E, `${shotLabel} | CityID:${cityId} | Crew:${crewLeader}`), // ImageDescription
            strEntry(0x010F, "City of Saint Paul"),       // Make
            strEntry(0x0110, "PLSS Capture"),             // Model
            strEntry(0x0131, `PLSS Capture v1 CityID:${cityId}`), // Software
            strEntry(0x013B, crewLeader || "Unknown"),   // Artist
            strEntry(0x0132, dtStr),                      // DateTime
            strEntry(0x8298, `City of Saint Paul Public Works ${now.getFullYear()}`), // Copyright
            // ExifIFD offset placeholder (tag 0x8769), GPS IFD offset (0x8825) added below
        ];

        // ExifIFD entries
        const exifEntries = [
            strEntry(0x9003, dtStr),  // DateTimeOriginal
            strEntry(0x9004, dtStr),  // DateTimeDigitized
        ];

        // GPS IFD entries (only if GPS available)
        let gpsEntries = [];
        if (gpsCache) {
            const latRef = gpsCache.lat >= 0 ? [78] : [83]; // N=78, S=83
            const lonRef = gpsCache.lon >= 0 ? [69] : [87]; // E=69, W=87
            gpsEntries = [
                entry(0x0001, 2, 2, latRef.concat([0])),   // GPSLatitudeRef
                entry(0x0002, 5, 3, dmsLE(gpsCache.lat)),  // GPSLatitude
                entry(0x0003, 2, 2, lonRef.concat([0])),   // GPSLongitudeRef
                entry(0x0004, 5, 3, dmsLE(gpsCache.lon)),  // GPSLongitude
                ...(gpsCache.alt != null ? [
                    entry(0x0005, 1, 1, [gpsCache.alt >= 0 ? 0 : 1]), // GPSAltitudeRef
                    entry(0x0006, 5, 1, leRat(Math.round(Math.abs(gpsCache.alt)*100),100)), // GPSAltitude
                ] : []),
            ];
        }

        // ── Layout: compute all offsets ───────────────────
        // TIFF header = 8 bytes
        // IFD0 starts at offset 8
        const TIFF_HEADER = 8;

        function packIFD(entries, nextIFDOffset) {
            // Sort by tag
            entries.sort((a,b) => {
                const ta = (a.hdr[0] | a.hdr[1]<<8);
                const tb = (b.hdr[0] | b.hdr[1]<<8);
                return ta - tb;
            });
            // header = 2 bytes count + 12*n + 4 bytes next IFD
            const hdrSize = 2 + 12 * entries.length + 4;
            let dataOffset = 0; // relative to start of data area
            const dataBlocks = [];
            const fixedHdrs = [];

            entries.forEach(e => {
                if (e.data.length > 0) {
                    dataBlocks.push({ offset: dataOffset, data: e.data });
                    dataOffset += e.data.length;
                    if (dataOffset % 2) dataOffset++;
                }
                fixedHdrs.push(e.hdr.slice());
            });

            return { hdrSize, dataBlocks, fixedHdrs, totalData: dataOffset, nextIFDOffset };
        }

        // Two-pass: first figure out sizes, then write offsets
        const exifPacked  = packIFD(exifEntries.slice(), 0);
        const gpsPacked   = packIFD(gpsEntries.slice(), 0);
        const ifd0WithSub = ifd0Entries.slice();

        // Add ExifIFD and GPSIFD pointer entries to IFD0 (placeholder offsets for now)
        ifd0WithSub.push(entry(0x8769, 4, 1, le32(0))); // ExifIFD offset
        if (gpsEntries.length) ifd0WithSub.push(entry(0x8825, 4, 1, le32(0))); // GPS IFD offset

        const ifd0Packed = packIFD(ifd0WithSub.slice(), 0);

        // ── Compute absolute offsets ──────────────────────
        const ifd0Start  = TIFF_HEADER;
        const ifd0HdrEnd = ifd0Start + (2 + 12 * ifd0Packed.fixedHdrs.length + 4);
        const ifd0DataStart = ifd0HdrEnd;
        const exifStart  = ifd0DataStart + ifd0Packed.totalData;
        const exifHdrEnd = exifStart + (2 + 12 * exifPacked.fixedHdrs.length + 4);
        const exifDataStart = exifHdrEnd;
        const gpsStart   = exifDataStart + exifPacked.totalData;
        const gpsHdrEnd  = gpsStart + (gpsEntries.length ? (2 + 12 * gpsPacked.fixedHdrs.length + 4) : 0);
        const gpsDataStart = gpsHdrEnd;

        // ── Write bytes ───────────────────────────────────
        const out = [];

        // TIFF header (LE)
        out.push(0x49, 0x49, 0x2A, 0x00); // II + magic 42 LE
        out.push(...le32(ifd0Start));       // IFD0 offset

        // IFD0
        out.push(...le16(ifd0Packed.fixedHdrs.length));
        ifd0Packed.fixedHdrs.forEach((hdr, i) => {
            const tag = hdr[0] | hdr[1]<<8;
            const h2 = hdr.slice();
            if (tag === 0x8769) {
                h2.splice(8,4,...le32(exifStart));
            } else if (tag === 0x8825) {
                h2.splice(8,4,...le32(gpsStart));
            } else if (hdr[8]===0 && hdr[9]===0 && hdr[10]===0 && hdr[11]===0) {
                // check if this needs a data offset
                const e = ifd0Packed.dataBlocks.find((_,idx) => idx === i);
            }
            out.push(...h2);
        });

        // Fix data offsets for IFD0 overflows
        // Actually redo properly: track which entries have overflow
        // Re-emit IFD0 with correct data offsets
        // (The above loop has a bug — let me redo with a cleaner packer)

        // ── CLEAN PACKER ──────────────────────────────────
        function buildIFD(entriesIn, dataAreaStart, nextIFD) {
            const sorted = entriesIn.slice().sort((a,b) => (a.hdr[0]|a.hdr[1]<<8)-(b.hdr[0]|b.hdr[1]<<8));
            const bytes = [];
            bytes.push(...le16(sorted.length));
            const dataChunks = [];
            let dataOff = dataAreaStart;

            sorted.forEach(e => {
                const h = e.hdr.slice();
                if (e.data.length > 0) {
                    // patch offset bytes at position 8-11
                    const off = le32(dataOff);
                    h[8]=off[0]; h[9]=off[1]; h[10]=off[2]; h[11]=off[3];
                    dataChunks.push(e.data);
                    dataOff += e.data.length;
                    if (dataOff % 2) dataOff++;
                }
                bytes.push(...h);
            });
            bytes.push(...le32(nextIFD)); // next IFD offset (0 = none)
            dataChunks.forEach(chunk => {
                bytes.push(...chunk);
                if (chunk.length % 2) bytes.push(0);
            });
            return bytes;
        }

        // Recompute sizes cleanly
        function ifdSize(entriesIn) {
            const sorted = entriesIn.slice().sort((a,b)=>(a.hdr[0]|a.hdr[1]<<8)-(b.hdr[0]|b.hdr[1]<<8));
            let sz = 2 + 12*sorted.length + 4;
            sorted.forEach(e => { if (e.data.length>0) { sz+=e.data.length; if(sz%2)sz++; } });
            return sz;
        }

        const ifd0Ents  = ifd0Entries.slice();
        const exifEnt   = exifEntries.slice();
        const gpsEnt    = gpsEntries.slice();

        // Compute offsets
        const off_ifd0      = TIFF_HEADER;
        const off_ifd0_data = off_ifd0 + 2 + 12*(ifd0Ents.length+2) + 4; // +2 for exif+gps pointers
        const sz_ifd0_data  = (() => { let s=0; ifd0Ents.forEach(e=>{if(e.data.length){s+=e.data.length;if(s%2)s++;}}); return s; })();
        const off_exif      = off_ifd0_data + sz_ifd0_data;
        const sz_exif       = ifdSize(exifEnt);
        const off_gps       = off_exif + sz_exif;

        // Add subIFD pointers to IFD0
        ifd0Ents.push(entry(0x8769, 4, 1, le32(off_exif)));
        if (gpsEnt.length) ifd0Ents.push(entry(0x8825, 4, 1, le32(off_gps)));

        const ifd0Bytes = buildIFD(ifd0Ents,  off_ifd0_data, 0);
        const exifBytes = buildIFD(exifEnt, off_exif + 2 + 12*exifEnt.length + 4, 0);
        const gpsBytes  = gpsEnt.length ? buildIFD(gpsEnt, off_gps + 2 + 12*gpsEnt.length + 4, 0) : [];

        // Full EXIF blob
        const tiffHeader = [0x49,0x49,0x2A,0x00,...le32(off_ifd0)];
        const exifData   = tiffHeader.concat(ifd0Bytes, exifBytes, gpsBytes);

        // APP1 segment: FF E1 + length (2 bytes, includes length field) + "Exif\0\0" + TIFF
        const app1Payload = [0x45,0x72,0x78,0x69,0x66,0x00,0x00].concat(exifData); // "Exif\0\0"
        const app1Len     = app1Payload.length + 2; // +2 for the length field itself
        const app1        = [0xFF, 0xE1, (app1Len>>8)&0xff, app1Len&0xff].concat(app1Payload);

        // ── Splice into JPEG ──────────────────────────────
        // Strip any existing APP1 EXIF segment if present
        let insertPoint = 2; // right after SOI (FF D8)
        const orig = Array.from(jpegBytes);

        // Skip any existing APP0 (JFIF) or APP1 (Exif) markers
        let pos = 2;
        while (pos < orig.length - 1) {
            if (orig[pos] !== 0xFF) break;
            const marker = orig[pos+1];
            if (marker === 0xE0 || marker === 0xE1) {
                const segLen = (orig[pos+2]<<8) | orig[pos+3];
                // Remove existing APP1 Exif
                if (marker === 0xE1 &&
                    orig[pos+4]===0x45 && orig[pos+5]===0x72 &&
                    orig[pos+6]===0x78 && orig[pos+7]===0x69) {
                    orig.splice(pos, segLen+2);
                    continue;
                }
                insertPoint = pos + 2 + segLen;
                pos = insertPoint;
            } else break;
        }
        insertPoint = 2; // always insert right after SOI for simplicity

        const result = orig.slice(0,insertPoint).concat(app1, orig.slice(insertPoint));
        const buf    = new Uint8Array(result);
        return new File([buf], file.name, { type: "image/jpeg" });

    } catch (err) {
        console.warn("EXIF injection failed:", err.message);
        return file;
    }
}

// ── COMPASS RULER ──────────────────────────────────
const rulerCanvas = document.getElementById("rulerCanvas");
const rCtx        = rulerCanvas.getContext("2d");
let   rulerHeading  = 0;
let   targetHeading = 0;
let   lastVibrateDeg = -1;

function initRuler() {
    const w = window.innerWidth;
    const dpr = window.devicePixelRatio || 1;
    rulerCanvas.width  = Math.round(w * dpr);
    rulerCanvas.height = Math.round(44 * dpr);
    rulerCanvas.style.width  = w + "px";
    rulerCanvas.style.height = "44px";
}
window.addEventListener("load",   initRuler);
window.addEventListener("resize", initRuler);
initRuler();

function drawRuler(heading) {
    const W   = rulerCanvas.width;
    const H   = rulerCanvas.height;
    const dpr = window.devicePixelRatio || 1;
    const PX_PER_DEG = 5 * dpr;

    rCtx.clearRect(0, 0, W, H);

    const cx       = W / 2;
    const span     = W / PX_PER_DEG;
    const startDeg = heading - span / 2;

    const LABELS = {0:"N",45:"NE",90:"E",135:"SE",180:"S",225:"SW",270:"W",315:"NW"};

    for (let d = Math.floor(startDeg) - 1; d <= startDeg + span + 1; d++) {
        const deg  = ((d % 360) + 360) % 360;
        const xPos = cx + (d - heading) * PX_PER_DEG;

        const isCard  = deg % 45 === 0;
        const isMaj   = deg % 10 === 0;

        const h = isCard ? H * 0.60 : isMaj ? H * 0.38 : H * 0.20;
        const a = isCard ? 1.0 : isMaj ? 0.55 : 0.22;
        const w = isCard ? 2.5 * dpr : isMaj ? 1.5 * dpr : 1 * dpr;

        rCtx.beginPath();
        rCtx.moveTo(xPos, 0);
        rCtx.lineTo(xPos, h);
        rCtx.strokeStyle = `rgba(255,255,255,${a})`;
        rCtx.lineWidth   = w;
        rCtx.stroke();

        if (LABELS[deg]) {
            const main = deg % 90 === 0;
            rCtx.font      = `${main?700:400} ${Math.round(11*dpr)}px -apple-system,sans-serif`;
            rCtx.fillStyle = main ? "#fff" : "rgba(255,255,255,0.5)";
            rCtx.textAlign = "center";
            rCtx.fillText(LABELS[deg], xPos, H * 0.92);
        }
    }
}

(function animateRuler() {
    let diff = targetHeading - rulerHeading;
    if (diff >  180) diff -= 360;
    if (diff < -180) diff += 360;
    rulerHeading += diff * 0.15;
    drawRuler(rulerHeading);
    requestAnimationFrame(animateRuler);
})();

function getCardinalFull(deg) {
    const d = ["N","NNE","NE","ENE","E","ESE","SE","SSE","S","SSW","SW","WSW","W","WNW","NW","NNW"];
    return d[Math.round(((deg%360)+360)%360/22.5)%16];
}

function updateHeading(h, isMagnetic) {
    h = ((h % 360) + 360) % 360;
    // Only apply declination if the source is magnetic (iOS webkitCompassHeading / Android alpha fallback)
    // deviceorientationabsolute already gives geographic/true north — no correction needed
    const grid = isMagnetic
        ? ((h + declination) % 360 + 360) % 360   // True = Magnetic + Declination (NOAA formula)
        : h;                                        // Already true/geographic north
    targetHeading = grid;
    const gridDeg = Math.round(grid);
    const magDeg  = isMagnetic ? Math.round(h) : Math.round(((h - declination) % 360 + 360) % 360);
    document.getElementById("compassReadout").innerHTML =
        `${gridDeg}°<span class="deg-cardinal">${getCardinalFull(gridDeg)}</span>` +
        `<span style="font-size:18px;font-weight:500;color:#6ab0f5;margin-left:10px;opacity:0.8;">` +
        `${magDeg}°M</span>`;

    // Vibrate on cardinal hits (within ±1°)
    const cardinals = [0, 90, 180, 270, 360];
    for (const c of cardinals) {
        const diff = Math.abs(gridDeg - c);
        if (diff <= 1 && gridDeg !== lastVibrateDeg) {
            lastVibrateDeg = gridDeg;
            if (navigator.vibrate) {
                // Short-long pattern: distinct feel for N, single for others
                navigator.vibrate(c === 0 || c === 360 ? [60, 40, 60] : [40]);
            }
        }
    }
    // Reset latch when moved away
    if (!cardinals.some(c => Math.abs(gridDeg - c) <= 1)) {
        lastVibrateDeg = -1;
    }
    const label = sequence[index] ? sequence[index][0] : "";
    if      (label.includes("North")) checkDir(grid, 0);
    else if (label.includes("East"))  checkDir(grid, 90);
    else if (label.includes("South")) checkDir(grid, 180);
    else if (label.includes("West"))  checkDir(grid, 270);
    else document.getElementById("compass").innerHTML = "";
}

function checkDir(cur, target) {
    const diff = Math.abs(((cur - target + 180) % 360 + 360) % 360 - 180);
    const deg  = Math.round(((cur%360)+360)%360);
    document.getElementById("compass").innerHTML = diff < 20
        ? `<span class="good">✓ On target</span>`
        : `<span class="warn">↑ ${deg}°</span>`;
}

// ── COMPASS INIT ───────────────────────────────────
function startCompass() {
    document.getElementById("compassPermBtn").style.display = "none";

    let usingAbsolute = false;

    // Android Chrome — deviceorientationabsolute gives TRUE/geographic north already
    window.addEventListener("deviceorientationabsolute", function(e) {
        if (e.alpha == null) return;
        usingAbsolute = true;
        updateHeading((360 - e.alpha + 360) % 360, false); // already true north, no declination needed
    });

    // iOS (webkitCompassHeading) + Android fallback (alpha)
    window.addEventListener("deviceorientation", function(e) {
        if (usingAbsolute) return;

        if (e.webkitCompassHeading != null) {
            updateHeading(e.webkitCompassHeading, true);   // iOS: magnetic heading
        } else if (e.alpha != null) {
            updateHeading((360 - e.alpha + 360) % 360, true); // Android fallback: magnetic
        }
    });
}

function requestCompassPermission() {
    // iOS 13+ requires explicit requestPermission from a user gesture
    if (typeof DeviceOrientationEvent.requestPermission === "function") {
        DeviceOrientationEvent.requestPermission()
            .then(state => {
                if (state === "granted") {
                    startCompass();
                } else {
                    document.getElementById("compassReadout").textContent = "Permission denied";
                }
            })
            .catch(() => {
                document.getElementById("compassReadout").textContent = "Permission error";
            });
    } else {
        startCompass();
    }
}

// Auto-start on Android / non-iOS; show button on iOS 13+
if (window.DeviceOrientationEvent || window.DeviceMotionEvent) {
    if (typeof DeviceOrientationEvent.requestPermission === "function") {
        // iOS 13+: must be triggered by user tap
        document.getElementById("compassPermBtn").style.display = "inline-block";
    } else {
        // Android, older iOS: start right away
        startCompass();
    }
} else {
    document.getElementById("compassReadout").innerHTML =
        `<span style="font-size:13px;opacity:0.4">No IMU</span>`;
}

// GALLERY BTN label
function updateGalleryBtn() {
    let count = Object.keys(captured).length;
    document.getElementById("galleryLabel").textContent =
        count === 0 ? "Gallery" : `Gallery (${count})`;
}

/* ── THUMBNAIL STRIP ──────────────────────────────── */
let thumbUrls = {};

function addThumbnail(file, label, idx) {
    let strip = document.getElementById("thumbStrip");

    // Remove empty hint on first photo
    let hint = document.getElementById("thumbHint");
    if (hint) hint.remove();

    // Remove "newest" shimmer from previous card
    strip.querySelectorAll(".thumb-card.newest").forEach(c => c.classList.remove("newest"));

    // Create object URL
    thumbUrls[idx] = URL.createObjectURL(file);

    // Random slight tilt  (-7° to +7°)
    let rot = ((Math.random() * 14) - 7).toFixed(2) + "deg";

    let card = document.createElement("div");
    card.className = "thumb-card newest";
    card.style.setProperty("--rot", rot);
    card.title = label;
    card.onclick = () => openGallery();

    let img = document.createElement("img");
    img.src = thumbUrls[idx];
    img.alt = label;

    let cap = document.createElement("div");
    cap.className = "tcap";
    cap.textContent = label;

    card.appendChild(img);
    card.appendChild(cap);
    strip.appendChild(card);

    // Scroll newest card into view
    setTimeout(() => card.scrollIntoView({ behavior: "smooth", inline: "end", block: "nearest" }), 80);
}

/* ── GALLERY CAROUSEL ─────────────────────────────── */
let galIndex = 0;
let galKeys  = [];
let galUrls  = {};   // objectURL cache

function openGallery() {
    galKeys = Object.keys(captured);
    if (galKeys.length === 0) { alert("No photos captured yet."); return; }

    // Revoke old URLs
    Object.values(galUrls).forEach(u => URL.revokeObjectURL(u));
    galUrls = {};
    galKeys.forEach(k => {
        galUrls[k] = URL.createObjectURL(captured[k].file);
    });

    // Build dots
    let dotsEl = document.getElementById("galDots");
    dotsEl.innerHTML = "";
    galKeys.forEach((_, i) => {
        let d = document.createElement("button");
        d.className = "gallery-dot" + (i === 0 ? " active" : "");
        d.addEventListener("click", () => galGoTo(i));
        dotsEl.appendChild(d);
    });

    galGoTo(0, true);
    document.getElementById("galleryOverlay").classList.add("open");
}

function closeGallery() {
    document.getElementById("galleryOverlay").classList.remove("open");
}

function galGoTo(n, instant) {
    galIndex = (n + galKeys.length) % galKeys.length;
    let k    = galKeys[galIndex];
    let img  = document.getElementById("galImg");

    if (!instant) {
        img.classList.add("fade-out");
        setTimeout(() => {
            img.src = galUrls[k];
            img.classList.remove("fade-out");
        }, 220);
    } else {
        img.src = galUrls[k];
    }

    document.getElementById("galLabel").textContent   = sequence[+k] ? sequence[+k][0] : captured[k].name;
    document.getElementById("galFile").textContent    = captured[k].name;
    document.getElementById("galCounter").textContent = `${galIndex + 1} / ${galKeys.length}`;

    // Arrows visibility
    document.getElementById("galPrev").style.opacity = galKeys.length > 1 ? "1" : "0";
    document.getElementById("galNext").style.opacity = galKeys.length > 1 ? "1" : "0";

    // Dots
    document.querySelectorAll(".gallery-dot").forEach((d, i) =>
        d.classList.toggle("active", i === galIndex));
}

function galStep(dir) {
    galGoTo(galIndex + dir);
}

// Touch swipe on gallery
(function() {
    let tx = null;
    let stage = document.getElementById("galleryStage");
    stage.addEventListener("touchstart", e => { tx = e.touches[0].clientX; }, { passive: true });
    stage.addEventListener("touchend",   e => {
        if (tx === null) return;
        let dx = e.changedTouches[0].clientX - tx;
        if (Math.abs(dx) > 45) galStep(dx < 0 ? 1 : -1);
        tx = null;
    });
})();

// EXPORT ALL — Web Share API with all files, fallback to individual downloads
async function exportAll() {
    let keys = Object.keys(captured);
    if (keys.length === 0) { alert("No photos captured yet."); return; }

    let files = keys.map(k => new File([captured[k].file], captured[k].name, { type: captured[k].file.type }));

    if (navigator.canShare && navigator.canShare({ files })) {
        try {
            await navigator.share({
                files,
                title: `PLSS ${cityId} – ${keys.length} photo(s)`,
                text: `PLSS capture session ${cityId}`
            });
            return;
        } catch (err) {
            if (err.name === "AbortError") return;
        }
    }
    // Fallback: download each file individually
    for (let k of keys) {
        let url = URL.createObjectURL(captured[k].file);
        let a = document.createElement("a");
        a.href = url; a.download = captured[k].name; a.click();
        await new Promise(r => setTimeout(r, 300));
        URL.revokeObjectURL(url);
    }
}

// ZIP EXPORT
async function exportZip() {
    let keys = Object.keys(captured);
    if (keys.length === 0) { alert("No photos to export"); return; }
    let zip = new JSZip();
    for (let k of keys) zip.file(captured[k].name, captured[k].file);
    let blob = await zip.generateAsync({ type: "blob" });
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `${date}_PLSS${cityId}.zip`;
    a.click();
}
