<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PLSS One Shot</title>

<style>
:root {
    --blue: #071D49;
    --gold: #F1B434;
    --red: #ff3b30;
}

body {
    margin: 0;
    font-family: -apple-system, sans-serif;
    background: #000;
    color: white;
    text-align: center;
}

.header {
    padding: 10px;
    background: var(--blue);
    font-weight: 600;
}

.main {
    display: flex;
    flex-direction: column;
    justify-content: center;
    height: calc(100vh - 140px);
    padding: 20px;
}

.title {
    font-size: 22px;
}

.filename {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 20px;
}

.camera-btn {
    background: var(--gold);
    color: black;
    font-size: 22px;
    padding: 25px;
    border-radius: 20px;
    border: none;
    width: 100%;
    margin-bottom: 10px;
}

.done-btn {
    background: var(--red);
    color: white;
    padding: 14px;
    border-radius: 12px;
    border: none;
    width: 100%;
    margin-bottom: 10px;
}

.export-btn {
    background: #34c759;
    color: white;
    padding: 14px;
    border-radius: 12px;
    border: none;
    width: 100%;
}

.compass {
    margin-top: 15px;
    font-size: 18px;
}

.good { color: #34c759; }
.warn { color: #ff3b30; }

.progress {
    margin-top: 10px;
    font-size: 14px;
}

input { display: none; }
</style>
</head>

<body>

<div class="header">PLSS Capture</div>

<div class="main">

<div class="title" id="title"></div>
<div class="filename" id="filename"></div>

<button class="camera-btn" onclick="takePhoto()">📷 TAKE PHOTO</button>
<button class="done-btn" onclick="finish()">✅ DONE</button>
<button class="export-btn" onclick="exportZip()">📦 EXPORT ZIP</button>

<input type="file" id="fileInput" accept="image/*" capture="environment">

<div class="compass" id="compass"></div>
<div class="progress" id="progress"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script>
let sequence = [];
let index = 0;
let captured = {};
let cityId = "";
let date = new Date().toISOString().slice(0,10).replace(/-/g,'');

function buildSequence() {
    let seq = [
        ["Monument Close-up","Monument_Closeup"],
        ["Looking North","LookingN"],
        ["Looking West","LookingW"],
        ["Looking South","LookingS"],
        ["Looking East","LookingE"]
    ];

    for (let i = 65; i <= 90; i++) {
        let L = String.fromCharCode(i);
        seq.push([`Tie ${L}`, `Tie${L}`]);
        seq.push([`Tie ${L} Close-up`, `Tie${L}_Cls`]);
    }

    seq.push(["Extra 1","Extra_1"]);
    return seq;
}

// INIT
cityId = prompt("Enter City ID (e.g. 049)");
sequence = buildSequence();
updateUI();

// CAMERA
function takePhoto() {
    document.getElementById("fileInput").click();
}

document.getElementById("fileInput").addEventListener("change", (e) => {
    let file = e.target.files[0];
    if (!file) return;

    captured[index] = {
        file,
        name: getFilename()
    };

    index++;
    if (index < sequence.length) updateUI();
    else alert("All shots complete — export when ready.");
});

// DONE BUTTON
function finish() {
    if (Object.keys(captured).length === 0) {
        alert("No photos captured yet");
        return;
    }

    if (confirm("Finish and export?")) {
        exportZip();
    }
}

// UI
function getFilename() {
    return `${sequence[index][1]}_Plss${cityId}_${date}.jpg`;
}

function updateUI() {
    let item = sequence[index];

    document.getElementById("title").innerText = item[0];
    document.getElementById("filename").innerText = getFilename();

    document.getElementById("progress").innerText =
        `${index + 1} / ${sequence.length}`;
}

// COMPASS
if (window.DeviceOrientationEvent) {
    window.addEventListener("deviceorientation", (event) => {
        let heading = event.alpha;
        if (heading === null) return;

        let text = `Heading: ${Math.round(heading)}°`;
        let label = sequence[index][0];

        if (label.includes("North")) checkDir(heading, 0, text);
        else if (label.includes("East")) checkDir(heading, 90, text);
        else if (label.includes("South")) checkDir(heading, 180, text);
        else if (label.includes("West")) checkDir(heading, 270, text);
        else document.getElementById("compass").innerText = "";
    });
}

function checkDir(current, target, text) {
    let diff = Math.abs(current - target);
    let el = document.getElementById("compass");

    if (diff < 20 || diff > 340) {
        el.innerHTML = `<span class="good">${text} ✓</span>`;
    } else {
        el.innerHTML = `<span class="warn">${text}</span>`;
    }
}

// ZIP EXPORT
async function exportZip() {
    if (Object.keys(captured).length === 0) {
        alert("No photos to export");
        return;
    }

    let zip = new JSZip();

    for (let key in captured) {
        zip.file(captured[key].name, captured[key].file);
    }

    let zipName = `${date}_PLSS${cityId}.zip`;

    let blob = await zip.generateAsync({ type: "blob" });

    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = zipName;
    a.click();
}
</script>

</body>
</html>
